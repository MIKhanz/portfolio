# GitHub Pages configuration
# https://docs.github.com/en/pages

title: "Irshan Khan — Product Leader & Innovator"
description: "Results-driven product leader with deep expertise in private wireless networks, edge computing, and intelligent location technologies."
url: "https://irshankhan.github.io"
